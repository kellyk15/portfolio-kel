        </button>

        <h2 id="popover-titel"></h2>
        <p id="popover-beschrijving"></p>
        <div id="popover-img-container">
            <img id="popover-img" src="" alt="">
            <img id="popover-img-2" src="" alt="">
        </div>
        <a id="popover-link" href="#" target="_blank" class="popover-btn">View project →</a>
    </div>

    <script src="../scripts/script.js"></script>
    
    <script>
        const popover = document.getElementById('popover');
        const overlay = document.getElementById('popover-overlay');

        function openPopover() {
            overlay.classList.add('active');
            requestAnimationFrame(() => popover.classList.add('active'));
        }

        function closePopover() {
            popover.classList.remove('active');
            overlay.classList.remove('active');
        }

        document.querySelectorAll('.more-item').forEach(item => {
            item.addEventListener('click', () => {
                if (!item.dataset.titel) return;

                document.getElementById('popover-titel').textContent = item.dataset.titel;
                document.getElementById('popover-beschrijving').textContent = item.dataset.beschrijving;

                const imgEl = document.getElementById('popover-img');
                if (item.dataset.img) {
                    imgEl.src = item.dataset.img;
                    imgEl.style.display = 'block';
                } else {
                    imgEl.style.display = 'none';
                }

                const imgEl2 = document.getElementById('popover-img-2');
                if (item.dataset.img2) {
                    imgEl2.src = item.dataset.img2;
                    imgEl2.style.display = 'block';
                } else {
                    imgEl2.style.display = 'none';
                }

                const linkEl = document.getElementById('popover-link');
                if (item.dataset.link) {
                    linkEl.href = item.dataset.link;
                    linkEl.style.display = 'inline-block';
                } else {
                    linkEl.style.display = 'none';
                }

                openPopover();
            });
        });

        overlay.addEventListener('click', closePopover);

        document.querySelector('.popover-close').addEventListener('click', closePopover);

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closePopover();
        });
    </script>
